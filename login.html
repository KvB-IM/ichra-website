<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broker Portal Login | ICHRA Masters</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        body {
            background-color: var(--primary-dark-navy);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-top: 6px solid var(--accent-gold);
            text-align: center;
        }

        .login-logo {
            margin-bottom: 2rem;
            /* Filter to turn white SVG into Navy */
            filter: invert(15%) sepia(50%) saturate(1612%) hue-rotate(204deg) brightness(96%) contrast(97%);
            height: 40px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary-navy);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-navy);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            background: var(--bg-light-sand);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gold);
            color: var(--white);
            border: none;
            border-radius: 4px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--primary-navy);
        }

        .back-home {
            display: block;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-home:hover {
            color: var(--primary-navy);
            text-decoration: underline;
        }
    </style>

    <!-- JSON-LD Structured Data for AI/SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ICHRA Masters",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "An ICHRA platform engineered for licensed health insurance agents to manage quoting, enrollment, and client relationships while retaining 100% of their commissions and Agent of Record (AOR).",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "provider": {
        "@type": "Organization",
        "name": "ICHRA Masters",
        "url": "https://ichramasters.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "service@ichramasters.com",
          "contactType": "customer support"
        }
      }
    }
    </script>
</head>

<body>
    
    <div class="login-container">
        <img src="ICHRA Masters Branding.svg" alt="ICHRA Masters Logo" class="login-logo" />
        <h2 class="login-title">Architect Portal</h2>
        <p class="login-subtitle">Enter your credentials to access your agency dashboard.</p>
        
        <form>
            <div class="form-group">
                <label>Broker Email</label>
                <input type="email" placeholder="broker@agency.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="submit-btn">Access Dashboard</button>
        </form>

        <a href="index.html" class="back-home">&larr; Return to main site</a>
    </div>

</body>
</html>
